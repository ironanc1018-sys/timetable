<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="내 시간표">
<meta name="theme-color" content="#0f172a">
<title>MEDI1101A 내 시간표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #273449;
  --border: rgba(255,255,255,0.08);
  --text: #f1f5f9;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --accent2: #818cf8;
  --green: #34d399;
  --amber: #fbbf24;
  --coral: #fb7185;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,23,42,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
}
.header-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Upload */
.upload-wrap { padding: 24px 20px; }
.upload-zone {
  border: 1.5px dashed rgba(56,189,248,0.4);
  border-radius: var(--radius);
  padding: 36px 20px;
  text-align: center;
  cursor: pointer;
  background: rgba(56,189,248,0.04);
  transition: all 0.2s;
  position: relative;
}
.upload-zone:active { background: rgba(56,189,248,0.08); transform: scale(0.99); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
.upload-icon {
  width: 48px; height: 48px; margin: 0 auto 14px;
  background: rgba(56,189,248,0.12);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.upload-icon svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.upload-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.upload-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }
.upload-hint { margin-top: 20px; font-size: 12px; color: var(--muted); background: var(--surface); border-radius: var(--radius-sm); padding: 10px 14px; line-height: 1.5; }

/* File chip */
.file-chip {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface2); border-radius: 999px;
  padding: 6px 14px; font-size: 13px; color: var(--accent);
  margin: 0 20px 16px; cursor: pointer;
}
.file-chip span { color: var(--muted); }

/* Section */
.section { padding: 0 20px 16px; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

/* Tag chips */
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
  font-size: 13px; padding: 6px 13px;
  border-radius: 999px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--surface);
  color: var(--muted);
  transition: all 0.15s;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.chip:active { transform: scale(0.96); }
.chip.sel-campus { background: rgba(56,189,248,0.15); color: var(--accent); border-color: rgba(56,189,248,0.35); }
.chip.sel-pbl { background: rgba(129,140,248,0.15); color: var(--accent2); border-color: rgba(129,140,248,0.35); }
.chip.sel-clin { background: rgba(251,191,36,0.12); color: var(--amber); border-color: rgba(251,191,36,0.3); }
.chip.sel-all { background: rgba(52,211,153,0.12); color: var(--green); border-color: rgba(52,211,153,0.3); }
.chip.sel-week { background: rgba(56,189,248,0.15); color: var(--accent); border-color: rgba(56,189,248,0.35); }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 0 20px 16px; }
.stat { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 600; color: var(--text); }
.stat-l { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 4px 20px 16px; }

/* Cards */
.cards { padding: 0 20px 100px; display: flex; flex-direction: column; gap: 10px; }
.week-label { font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; margin: 8px 0 4px; font-family: 'DM Mono', monospace; }
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 14px 16px;
  transition: transform 0.1s;
}
.card:active { transform: scale(0.99); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-title { font-size: 14px; font-weight: 500; line-height: 1.4; flex: 1; padding-right: 10px; }
.card-badges { display: flex; gap: 5px; flex-shrink: 0; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
.b-m { background: rgba(52,211,153,0.15); color: var(--green); }
.b-o { background: rgba(148,163,184,0.12); color: var(--muted); }
.b-lab { background: rgba(129,140,248,0.15); color: var(--accent2); }
.b-lec { background: rgba(56,189,248,0.12); color: var(--accent); }
.b-pbl { background: rgba(251,191,36,0.12); color: var(--amber); }
.b-other { background: rgba(148,163,184,0.1); color: var(--muted); }
.card-meta { display: flex; flex-wrap: wrap; gap: 6px 12px; }
.meta-item { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.meta-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); opacity: 0.4; }
.card-students { margin-top: 8px; font-size: 11px; font-family: 'DM Mono', monospace; color: rgba(56,189,248,0.7); background: rgba(56,189,248,0.06); border-radius: 6px; padding: 4px 8px; display: inline-block; }

/* Empty */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; line-height: 1.7; }
.empty-icon { font-size: 36px; margin-bottom: 12px; }

/* All weeks btn */
.all-weeks { font-size: 12px; padding: 6px 13px; border-radius: 999px; border: 1px solid var(--border); cursor: pointer; background: var(--surface2); color: var(--accent); font-weight: 500; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">MEDI1101A 내 시간표</div>
  <div class="header-sub" id="headerSub">파일을 업로드해서 시작하세요</div>
</div>

<div id="uploadSection" class="upload-wrap">
  <div class="upload-zone">
    <input type="file" accept=".xlsx,.xls" onchange="loadFile(event)">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="upload-title">시간표 엑셀 업로드</div>
    <div class="upload-sub">MEDI1101A_2026_Timetable .xlsx 파일<br>업데이트될 때마다 새로 올리면 돼요</div>
  </div>
  <div class="upload-hint">
    💡 홈 화면에 추가하면 앱처럼 쓸 수 있어요<br>
    Safari → 공유 버튼 → "홈 화면에 추가"
  </div>
</div>

<div id="appSection" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 4px">
    <div class="file-chip" onclick="document.getElementById('reupload').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span id="fileName">파일명</span>
      <input type="file" id="reupload" accept=".xlsx,.xls" style="display:none" onchange="loadFile(event)">
    </div>
  </div>

  <div class="section">
    <div class="section-label">Campus</div>
    <div class="chips" id="campusTags"></div>
  </div>

  <div class="section">
    <div class="section-label">내 그룹</div>
    <div class="chips" id="studentTags"></div>
  </div>

  <div class="section">
    <div class="section-label">주차</div>
    <div class="chips" id="weekTags"></div>
  </div>

  <div class="divider"></div>
  <div class="stats" id="statsRow"></div>
  <div class="cards" id="cards"></div>
</div>

<script>
let allRows=[], selStudents=new Set(), selCampus=new Set(), selWeeks=new Set();
const DAY_ORDER={Mon:0,Tue:1,Wed:2,Thu:3,Fri:4,Sat:5,Sun:6};

function loadFile(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'binary',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    parseData(raw, f.name);
  };
  r.readAsBinaryString(f);
}

function parseData(raw, fname){
  const hdrRow=raw.findIndex(r=>r.some(c=>String(c).toLowerCase()==='campus')&&r.some(c=>String(c).toLowerCase().includes('student')));
  if(hdrRow<0){alert('헤더를 찾을 수 없어요.');return;}
  const hdrs=raw[hdrRow].map(h=>String(h).trim().toLowerCase());
  const ci={
    campus: hdrs.findIndex(h=>h==='campus'),
    week:   hdrs.findIndex(h=>h.includes('week')),
    day:    hdrs.findIndex(h=>h==='day'),
    date:   hdrs.findIndex(h=>h==='date'),
    time:   hdrs.findIndex(h=>h==='time'),
    students: hdrs.findIndex(h=>h.includes('student')),
    venue:  hdrs.findIndex(h=>h==='venue'),
    type:   hdrs.findIndex(h=>h==='type'),
    domain: hdrs.findIndex(h=>h==='domain'),
    att:    hdrs.findIndex(h=>h.includes('attend')),
    activity: hdrs.findIndex(h=>h.includes('name of activity')||h.includes('activity')),
  };
  const validCampus=['central coast','callaghan'];
  allRows=[];
  for(let i=hdrRow+1;i<raw.length;i++){
    const r=raw[i];
    const campus=String(r[ci.campus]||'').trim().replace(/\n/g,' ').replace(/\s+/g,' ');
    const cL=campus.toLowerCase();
    if(!validCampus.some(v=>cL.includes(v))) continue;
    let dateStr='';
    const dv=r[ci.date];
    if(dv instanceof Date) dateStr=dv.toISOString().slice(0,10);
    else if(typeof dv==='number'){const d=new Date(Math.round((dv-25569)*86400*1000));dateStr=d.toISOString().slice(0,10);}
    else dateStr=String(dv||'').slice(0,10);
    const campusClean=cL.includes('central coast')&&cL.includes('callaghan')?'Callaghan & Central Coast':cL.includes('central coast')?'Central Coast':'Callaghan';
    allRows.push({
      campus: campusClean,
      week:   String(r[ci.week]||'').replace('.0','').trim(),
      day:    String(r[ci.day]||'').trim(),
      date:   dateStr,
      time:   String(r[ci.time]||'').trim(),
      students: String(r[ci.students]||'').trim(),
      venue:  String(r[ci.venue]||'').trim(),
      type:   String(r[ci.type]||'').trim(),
      domain: String(r[ci.domain]||'').trim(),
      att:    String(r[ci.att]||'').trim(),
      activity: String(r[ci.activity]||'').trim(),
    });
  }
  document.getElementById('uploadSection').style.display='none';
  document.getElementById('appSection').style.display='block';
  document.getElementById('fileName').textContent=fname.length>28?fname.slice(0,25)+'…':fname;
  document.getElementById('headerSub').textContent=allRows.length+'개 수업 로드됨';
  selStudents.clear(); selCampus.clear(); selWeeks.clear();
  buildFilters();
  renderCards();
}

function normStudents(s){
  return s.split(',').map(x=>x.trim().toUpperCase().replace(/\s+/g,' ').replace('CAL - ALL','CAL-ALL').replace('CC - ALL','CC-ALL'));
}

function rowMatchesStudent(row){
  const vals=normStudents(row.students);
  for(const v of vals){
    if(v==='ALL'||v==='ALL ') return true;
    if(v==='CAL-ALL'&&selCampus.has('Callaghan')) return true;
    if(v==='CC-ALL'&&selCampus.has('Central Coast')) return true;
    for(const sel of selStudents){
      const selN=sel.toUpperCase().replace(/\s+/g,' ');
      if(v===selN) return true;
      if(selN.startsWith('PBL:')){
        const letter=selN.replace('PBL:','').trim();
        if(v.startsWith('PBL:')&&v.includes(letter)){
          const letters=v.replace('PBL:','').split(/[\s,+]+/).map(x=>x.trim());
          if(letters.includes(letter)) return true;
        }
      }
    }
  }
  return false;
}

function getFiltered(){
  return allRows.filter(row=>{
    if(selCampus.size>0){
      const c=row.campus;
      const match=[...selCampus].some(sc=>c.includes(sc));
      if(!match) return false;
    }
    if(selWeeks.size>0&&!selWeeks.has(row.week)) return false;
    if(selStudents.size===0) return true;
    return rowMatchesStudent(row);
  }).sort((a,b)=>{
    const wd=(parseInt(a.week)||0)-(parseInt(b.week)||0);
    if(wd!==0) return wd;
    const da=DAY_ORDER[a.day]??9, db=DAY_ORDER[b.day]??9;
    if(da!==db) return da-db;
    return a.time.localeCompare(b.time);
  });
}

function buildFilters(){
  const campusSet=new Set(), weekSet=new Set(), studentSet=new Set();
  allRows.forEach(r=>{
    if(r.campus.includes('&')){campusSet.add('Callaghan');campusSet.add('Central Coast');}
    else campusSet.add(r.campus);
    if(r.week) weekSet.add(r.week);
    normStudents(r.students).forEach(v=>{
      if(v&&v!=='ALL'&&v!=='ALL ') studentSet.add(v);
    });
  });

  // Campus
  const campusEl=document.getElementById('campusTags');
  campusEl.innerHTML='';
  [...campusSet].sort().forEach(c=>{
    const t=mkChip(c,'campus',()=>{
      if(selCampus.has(c)){selCampus.delete(c);t.className='chip';}
      else{selCampus.add(c);t.className='chip sel-campus';}
      renderCards();
    });
    campusEl.appendChild(t);
  });

  // Students grouped
  const pbl=[], clin=[], other=[];
  [...studentSet].sort().forEach(s=>{
    if(s.startsWith('PBL:')) pbl.push(s);
    else if(s.startsWith('CLIN:')) clin.push(s);
    else other.push(s);
  });
  const stEl=document.getElementById('studentTags');
  stEl.innerHTML='';
  [...other,...pbl,...clin].forEach(s=>{
    const cls=s.startsWith('PBL:')?'sel-pbl':s.startsWith('CLIN:')?'sel-clin':'sel-all';
    const t=mkChip(s,'',()=>{
      if(selStudents.has(s)){selStudents.delete(s);t.className='chip';}
      else{selStudents.add(s);t.className='chip '+cls;}
      renderCards();
    });
    stEl.appendChild(t);
  });

  // Weeks
  const weekArr=[...weekSet].sort((a,b)=>(parseInt(a)||0)-(parseInt(b)||0));
  const wkEl=document.getElementById('weekTags');
  wkEl.innerHTML='';
  const allBtn=document.createElement('span');
  allBtn.className='chip sel-campus'; allBtn.textContent='전체';
  allBtn.onclick=()=>{selWeeks.clear();wkEl.querySelectorAll('[data-week]').forEach(b=>b.className='chip');renderCards();};
  wkEl.appendChild(allBtn);
  weekArr.forEach(w=>{
    const t=document.createElement('span');
    t.className='chip'; t.textContent='W'+w; t.dataset.week=w;
    t.onclick=()=>{
      if(selWeeks.has(w)){selWeeks.delete(w);t.className='chip';}
      else{selWeeks.add(w);t.className='chip sel-week';}
      renderCards();
    };
    wkEl.appendChild(t);
  });
}

function mkChip(label, selClass, onclick){
  const t=document.createElement('span');
  t.className='chip'; t.textContent=label;
  t.onclick=onclick;
  return t;
}

function typeBadge(type){
  const t=type.toLowerCase();
  if(t.includes('lab')) return `<span class="badge b-lab">Lab</span>`;
  if(t.includes('online lecture')||t.includes('lecture')) return `<span class="badge b-lec">Lecture</span>`;
  if(t.includes('pbl')) return `<span class="badge b-pbl">PBL</span>`;
  return `<span class="badge b-other">${type||'—'}</span>`;
}

function renderCards(){
  const rows=getFiltered();
  const stats=document.getElementById('statsRow');
  const cards=document.getElementById('cards');

  stats.innerHTML=`
    <div class="stat"><div class="stat-n">${rows.length}</div><div class="stat-l">수업</div></div>
    <div class="stat"><div class="stat-n">${new Set(rows.map(r=>r.date)).size}</div><div class="stat-l">일자</div></div>
    <div class="stat"><div class="stat-n">${rows.filter(r=>r.att==='M').length}</div><div class="stat-l">필수</div></div>
  `;

  if(rows.length===0){
    cards.innerHTML='<div class="empty"><div class="empty-icon">📭</div>그룹을 선택하면<br>내 수업만 보여요</div>';
    return;
  }

  let html='', prevWeek='', prevDay='';
  rows.forEach(r=>{
    if(r.week!==prevWeek){
      html+=`<div class="week-label">Week ${r.week}</div>`;
      prevWeek=r.week; prevDay='';
    }
    const attBadge=r.att==='M'?'<span class="badge b-m">필수</span>':'';
    const dateDisp=r.date?r.date.slice(5).replace('-','/'):'';
    html+=`<div class="card">
      <div class="card-top">
        <div class="card-title">${r.activity||'—'}</div>
        <div class="card-badges">${attBadge}${typeBadge(r.type)}</div>
      </div>
      <div class="card-meta">
        <span class="meta-item">${r.day} ${dateDisp}</span>
        <span class="meta-dot"></span>
        <span class="meta-item">${r.time}</span>
        ${r.venue?`<span class="meta-dot"></span><span class="meta-item">${r.venue}</span>`:''}
        ${r.domain?`<span class="meta-dot"></span><span class="meta-item">${r.domain}</span>`:''}
      </div>
      ${r.students?`<div class="card-students">${r.students}</div>`:''}
    </div>`;
  });
  cards.innerHTML=html;
}
</script>
</body>
</html>
