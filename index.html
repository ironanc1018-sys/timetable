<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timetable">
<meta name="theme-color" content="#0f172a">
<title>Timetable</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#273449;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f1f5f9;--muted:#94a3b8;--hint:#4e6180;
  --blue:#38bdf8;--purple:#818cf8;--amber:#fbbf24;--green:#34d399;
  --radius:14px;--radius-sm:8px;--radius-xs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;overscroll-behavior:none}

.header{position:sticky;top:0;z-index:200;background:rgba(15,23,42,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 18px 10px}
.header-title{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px}

.upload-wrap{padding:28px 18px}
.upload-zone{border:1.5px dashed rgba(56,189,248,0.35);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;background:rgba(56,189,248,0.04);position:relative;transition:all 0.15s}
.upload-zone:active{background:rgba(56,189,248,0.09)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{width:52px;height:52px;margin:0 auto 16px;background:rgba(56,189,248,0.1);border-radius:14px;display:flex;align-items:center;justify-content:center}
.upload-icon svg{width:26px;height:26px;stroke:var(--blue);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.upload-title{font-size:16px;font-weight:500;margin-bottom:6px}
.upload-sub{font-size:13px;color:var(--muted);line-height:1.6}
.pwa-hint{margin-top:20px;font-size:12px;color:var(--muted);background:var(--surface);border-radius:var(--radius-sm);padding:11px 14px;line-height:1.6;text-align:left}

.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(15,23,42,0.8);position:sticky;top:57px;z-index:100;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.tab{flex:1;padding:11px 0;text-align:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

.profile-card{margin:16px 18px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border2);overflow:hidden}
.profile-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.profile-header-left{font-size:14px;font-weight:600;color:var(--text)}
.profile-header-sub{font-size:12px;color:var(--muted);margin-top:2px}
.profile-edit-btn{font-size:12px;color:var(--blue);cursor:pointer;padding:4px 10px;border-radius:999px;border:1px solid rgba(56,189,248,0.3);background:rgba(56,189,248,0.08);white-space:nowrap}
.profile-groups{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px}
.profile-tag{font-size:12px;padding:4px 11px;border-radius:999px;font-family:'DM Mono',monospace;font-weight:500}
.pt-pbl{background:rgba(129,140,248,0.2);color:var(--purple);border:1px solid rgba(129,140,248,0.35)}
.pt-clin{background:rgba(251,191,36,0.15);color:var(--amber);border:1px solid rgba(251,191,36,0.3)}
.pt-campus{background:rgba(56,189,248,0.15);color:var(--blue);border:1px solid rgba(56,189,248,0.3)}
.pt-intl{background:rgba(52,211,153,0.13);color:var(--green);border:1px solid rgba(52,211,153,0.28)}

.profile-editor{padding:16px 18px 100px}
.ed-label{font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
.ed-label:first-child{margin-top:0}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:13px;padding:6px 13px;border-radius:999px;border:1px solid var(--border2);cursor:pointer;background:var(--surface2);color:var(--muted);transition:all 0.12s;font-family:'DM Mono',monospace;white-space:nowrap;user-select:none}
.chip:active{transform:scale(0.95)}
.chip.s-pbl{background:rgba(129,140,248,0.18);color:var(--purple);border-color:rgba(129,140,248,0.4)}
.chip.s-clin{background:rgba(251,191,36,0.14);color:var(--amber);border-color:rgba(251,191,36,0.35)}
.chip.s-campus{background:rgba(56,189,248,0.15);color:var(--blue);border-color:rgba(56,189,248,0.35)}
.chip.s-intl{background:rgba(52,211,153,0.13);color:var(--green);border-color:rgba(52,211,153,0.3)}
.chip.s-week{background:rgba(56,189,248,0.15);color:var(--blue);border-color:rgba(56,189,248,0.35)}
.save-btn{display:block;width:100%;margin-top:20px;padding:13px;background:var(--blue);color:#0f172a;font-size:15px;font-weight:600;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.15s}
.save-btn:active{opacity:0.8}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:0 18px 4px}
.stat{background:var(--surface);border-radius:var(--radius-sm);padding:11px;text-align:center}
.stat-n{font-size:22px;font-weight:600}
.stat-l{font-size:11px;color:var(--muted);margin-top:1px}

.week-filter-row{display:flex;flex-wrap:wrap;gap:7px;padding:0 18px 12px}

.cal-wrap{padding:12px 18px 100px}
.week-section{margin-bottom:28px}
.week-title{font-size:12px;font-weight:600;color:var(--blue);letter-spacing:0.07em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:10px}
.cal-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);border:1px solid var(--border2)}
.cal-grid{display:grid;background:var(--bg)}
.cal-header{display:grid;background:var(--surface2);border-bottom:1px solid var(--border2)}
.cal-day-head{padding:8px 4px;text-align:center;border-right:1px solid var(--border)}
.cal-day-head:last-child{border-right:none}
.day-name{font-size:12px;font-weight:600;color:var(--hint)}
.day-name.has-class{color:var(--text)}
.day-date{font-size:10px;color:var(--hint);margin-top:1px}
.cal-body{display:grid}
.time-cell{height:56px;display:flex;align-items:flex-start;padding:4px 5px 0;font-size:10px;color:var(--hint);font-family:'DM Mono',monospace;border-right:1px solid var(--border);border-bottom:1px solid var(--border);white-space:nowrap}
.day-col{position:relative;border-right:1px solid var(--border)}
.day-col:last-child{border-right:none}
.hour-line{position:absolute;left:0;right:0;height:1px;background:var(--border);pointer-events:none}
.cal-event{position:absolute;left:2px;right:2px;border-radius:var(--radius-xs);padding:4px 6px;font-size:11px;line-height:1.3;overflow:hidden;cursor:pointer}
.cal-event:active{opacity:0.7}
.ev-title{font-weight:500;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.ev-time{font-size:10px;opacity:0.75;margin-top:1px;font-family:'DM Mono',monospace}
.ev-venue{font-size:10px;opacity:0.65;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ev-lab{background:rgba(129,140,248,0.25);color:#c4c9fc;border-left:2px solid var(--purple)}
.ev-lecture{background:rgba(56,189,248,0.2);color:#a5d8f5;border-left:2px solid var(--blue)}
.ev-pbl{background:rgba(251,191,36,0.18);color:#f5d97a;border-left:2px solid var(--amber)}
.ev-other{background:rgba(148,163,184,0.15);color:#cbd5e1;border-left:2px solid var(--hint)}
.ev-notime{background:rgba(100,100,120,0.18);color:#94a3b8;border-left:2px solid var(--hint);font-size:10px;padding:3px 5px}

.empty{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px;line-height:1.9}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 44px;width:100%;max-width:520px;animation:slideup 0.22s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--hint);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px;line-height:1.4}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px}
.modal-row:last-child{border-bottom:none}
.modal-key{color:var(--muted);flex-shrink:0;margin-right:12px}
.modal-val{font-weight:500;text-align:right}
.badge-m{background:rgba(52,211,153,0.15);color:var(--green);padding:3px 10px;border-radius:999px;font-size:12px}
.badge-o{background:rgba(148,163,184,0.1);color:var(--muted);padding:3px 10px;border-radius:999px;font-size:12px}

.reupload-row{display:flex;align-items:center;padding:12px 18px 0}
.file-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border-radius:999px;padding:7px 14px;font-size:12px;color:var(--blue);cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
.file-chip svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Timetable</div>
  <div class="header-sub" id="headerSub">파일을 업로드해서 시작하세요</div>
</div>

<div id="uploadSection" class="upload-wrap">
  <div class="upload-zone">
    <input type="file" accept=".xlsx,.xls" onchange="loadFile(event)">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="upload-title">시간표 엑셀 업로드</div>
    <div class="upload-sub">MEDI1101A 시간표 .xlsx 파일<br>업데이트될 때마다 새로 올리면 돼요</div>
  </div>
  <div class="pwa-hint">💡 Safari → 공유버튼 → 홈 화면에 추가 하면 앱처럼 써요</div>
</div>

<div id="appSection" style="display:none">
  <div class="tabs">
    <div class="tab active" id="tabBtn0" onclick="switchTab(0)">내 시간표</div>
    <div class="tab" id="tabBtn1" onclick="switchTab(1)">설정</div>
  </div>

  <div id="panel0">
    <div class="profile-card" id="profileCard">
      <div class="profile-header">
        <div>
          <div class="profile-header-left">내 그룹</div>
          <div class="profile-header-sub" id="profileSub">설정에서 그룹을 선택하세요</div>
        </div>
        <div class="profile-edit-btn" onclick="switchTab(1)">편집</div>
      </div>
      <div class="profile-groups" id="profileGroups">
        <span style="font-size:13px;color:var(--hint)">아직 선택된 그룹이 없어요</span>
      </div>
    </div>

    <div class="week-filter-row" id="weekFilterRow"></div>
    <div class="stats" id="statsRow"></div>
    <div style="height:12px"></div>
    <div class="cal-wrap" id="calWrap">
      <div class="empty">설정에서 내 그룹을 선택하면<br>시간표가 여기 나와요</div>
    </div>
  </div>

  <div id="panel1" style="display:none">
    <div class="reupload-row">
      <button class="file-chip" onclick="document.getElementById('reupload').click()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span id="fileName">파일 재업로드</span>
      </button>
      <input type="file" id="reupload" accept=".xlsx,.xls" style="display:none" onchange="loadFile(event)">
    </div>
    <div class="profile-editor">
      <div class="ed-label">Campus</div>
      <div class="chips" id="ed-campus"></div>
      <div class="ed-label">PBL 그룹</div>
      <div class="chips" id="ed-pbl"></div>
      <div class="ed-label">CLIN 그룹</div>
      <div class="chips" id="ed-clin"></div>
      <div class="ed-label">International / 기타</div>
      <div class="chips" id="ed-intl"></div>
      <button class="save-btn" onclick="saveProfile()">저장하고 시간표 보기</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
var allRows = [];
var selStudents = new Set();  // stores PBL:G, CLIN:7 etc
var selCampus = new Set();    // stores 'Callaghan', 'Central Coast'
var selIntl = false;
var selWeeks = new Set();
var modalEvents = [];
var PX_PER_H = 56;

// Normalize day abbreviations to Mon/Tue/Wed/Thu/Fri
var DAY_NORM = {
  'mon':'Mon','tue':'Tue','tues':'Tue','wed':'Wed','thu':'Thu','thur':'Thu','thurs':'Thu','fri':'Fri',
  'mon ':'Mon','tue ':'Tue','wed ':'Wed','thu ':'Thu','fri ':'Fri'
};
var DAYS = ['Mon','Tue','Wed','Thu','Fri'];
var DAY_KO = {Mon:'월',Tue:'화',Wed:'수',Thu:'목',Fri:'금'};

// Saved profile
var profile = {campus:'',pbl:'',clin:'',intl:false};
try { var s=localStorage.getItem('medi_profile'); if(s) profile=JSON.parse(s); } catch(e){}

function switchTab(i){
  [0,1].forEach(function(j){
    document.getElementById('tabBtn'+j).classList.toggle('active',j===i);
    document.getElementById('panel'+j).style.display=j===i?'block':'none';
  });
}

function loadFile(e){
  var f=e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){
    var wb=XLSX.read(ev.target.result,{type:'binary',cellDates:true});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    parseData(raw,f.name);
  };
  r.readAsBinaryString(f);
}

function parseData(raw,fname){
  var hdrRow=-1;
  for(var i=0;i<raw.length;i++){
    var r=raw[i];
    if(r.some(function(c){return String(c).trim().toLowerCase()==='campus';})&&
       r.some(function(c){return String(c).toLowerCase().includes('student');})){hdrRow=i;break;}
  }
  if(hdrRow<0){alert('헤더를 찾을 수 없어요.');return;}
  var hdrs=raw[hdrRow].map(function(h){return String(h).trim().toLowerCase();});
  function fi(fn){return hdrs.findIndex(fn);}
  var ci={
    campus: fi(function(h){return h==='campus';}),
    week:   fi(function(h){return h.includes('week');}),
    day:    fi(function(h){return h==='day';}),
    date:   fi(function(h){return h==='date';}),
    time:   fi(function(h){return h==='time';}),
    students: fi(function(h){return h.includes('student');}),
    venue:  fi(function(h){return h==='venue';}),
    type:   fi(function(h){return h==='type';}),
    domain: fi(function(h){return h==='domain';}),
    att:    fi(function(h){return h.includes('attend');}),
    activity: fi(function(h){return h.includes('name of activity')||h==='activity';}),
  };
  allRows=[];
  for(var i=hdrRow+1;i<raw.length;i++){
    var r=raw[i];
    var campus=String(r[ci.campus]||'').trim().replace(/\n/g,' ').replace(/\s+/g,' ');
    var cL=campus.toLowerCase();
    if(!cL.includes('callaghan')&&!cL.includes('central coast')) continue;

    // Normalize campus
    var campusClean=(cL.includes('callaghan')&&cL.includes('central coast'))?'Both':
                    cL.includes('central coast')?'Central Coast':'Callaghan';

    // Date
    var dateStr='';
    var dv=r[ci.date];
    if(dv instanceof Date) dateStr=dv.toISOString().slice(0,10);
    else if(typeof dv==='number'&&dv>10000){
      var d=new Date(Math.round((dv-25569)*86400*1000));
      dateStr=d.toISOString().slice(0,10);
    } else dateStr=String(dv||'').slice(0,10);

    // Day - normalize variations
    var rawDay=String(r[ci.day]||'').trim();
    var normDay=DAY_NORM[rawDay.toLowerCase()]||rawDay;

    // If day doesn't match date, use date-derived day (more reliable)
    if(dateStr&&normDay){
      var dateObj=new Date(dateStr+'T00:00:00');
      var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var dateDay=dayNames[dateObj.getDay()];
      if(dateDay&&DAYS.indexOf(dateDay)>=0){
        normDay=dateDay; // trust the date
      }
    }

    var timeStr=String(r[ci.time]||'').trim();
    var parsed=parseTimeRange(timeStr);
    var studentsRaw=String(r[ci.students]||'').trim();

    allRows.push({
      campus:campusClean, week:String(r[ci.week]||'').replace('.0','').trim(),
      day:normDay, date:dateStr, time:timeStr,
      startMin:parsed[0], endMin:parsed[1], hasTime:parsed[2],
      students:studentsRaw,
      studentsNorm:normalizeStudents(studentsRaw),
      venue:String(r[ci.venue]||'').trim(), type:String(r[ci.type]||'').trim(),
      domain:String(r[ci.domain]||'').trim(), att:String(r[ci.att]||'').trim(),
      activity:String(r[ci.activity]||'').trim(),
    });
  }

  document.getElementById('uploadSection').style.display='none';
  document.getElementById('appSection').style.display='block';
  document.getElementById('fileName').textContent=fname.length>24?fname.slice(0,22)+'…':fname;
  document.getElementById('headerSub').textContent=allRows.length+'개 수업 로드됨';

  selStudents.clear(); selCampus.clear(); selIntl=false; selWeeks.clear();
  buildEditorChips();
  applyProfile();
  renderWeekFilter();
  renderCal();
}

// ── TIME PARSING ──
// Handles: 9.00am-10.30am, 1.00pm-2.30pm, 10:30am-12md, 8:30am-10.00am, 12md-1:00pm
function parseTimeRange(t){
  if(!t||typeof t!=='string') return [0,0,false];
  t=t.trim().toLowerCase();

  // Handle 12md/12noon = 12:00pm
  t=t.replace(/12md/g,'12:00pm').replace(/12noon/g,'12:00pm');

  // Normalize dots to colons in time tokens: 9.00 -> 9:00
  t=t.replace(/(\d{1,2})\.(\d{2})/g,function(m,h,mn){return h+':'+mn;});

  // Extract all time tokens: (hour:min ampm)
  var tokens=[];
  var re=/(\d{1,2}):(\d{2})\s*(am|pm)?/gi;
  var m;
  while((m=re.exec(t))!==null){
    tokens.push({h:parseInt(m[1]),mn:parseInt(m[2]),ap:(m[3]||'').toLowerCase(),idx:m.index});
  }
  if(tokens.length<2) return [0,0,false];

  var t1=tokens[0], t2=tokens[tokens.length>1?1:0];

  // Determine am/pm for each token
  // If t2 has pm and t1 doesn't, t1 might also be pm (e.g. 1:00pm - 2:30pm where 1:00 has no am/pm)
  if(!t1.ap && t2.ap) t1.ap=t2.ap;

  function toMin(tok){
    var h=tok.h, mn=tok.mn, ap=tok.ap;
    if(ap==='pm'&&h!==12) h+=12;
    if(ap==='am'&&h===12) h=0;
    return h*60+mn;
  }

  var start=toMin(t1);
  var end=toMin(t2);

  // Sanity check: end must be after start; if not, add 12h to end
  if(end<=start) end+=12*60;
  // Duration must be reasonable (< 8 hours)
  if(end-start>8*60) end=start+60; // fallback to 1hr

  return [start,end,true];
}

// ── STUDENT NORMALIZATION ──
// Returns array of canonical tokens from a Students cell
// Handles: "PBL: E,G,I,K,M,N,O,P", "CLIN: 1 &Clin: 2, 1-4", "CAL-ALL", "ALL", "International Students"
function normalizeStudents(s){
  if(!s) return [];
  var tokens=[];
  var raw=s.trim();

  // Step 1: Extract PBL multi-letter blocks BEFORE splitting by comma
  // e.g. "PBL: E,G,I,K,M,N,O,P" must be handled as one unit
  var pblBlockRe=/PBL:\s*([A-Z](?:\s*,\s*[A-Z])+)/gi;
  raw=raw.replace(pblBlockRe,function(match,letters){
    letters.split(',').forEach(function(l){
      l=l.trim().toUpperCase();
      if(l) tokens.push('PBL:'+l);
    });
    return '';
  });

  // Step 2: Split remainder by & then by comma
  var ampParts=raw.split('&');
  ampParts.forEach(function(part){
    var commaParts=part.split(',');
    commaParts.forEach(function(sp){
      sp=sp.trim().replace(/\s+/g,' ');
      if(!sp) return;
      sp=sp.replace(/\s+\d+-\d+$/,'').trim();
      if(!sp) return;
      sp=sp.replace(/CAL\s*-\s*ALL/gi,'CAL-ALL').replace(/CC\s*-\s*ALL/gi,'CC-ALL');

      var clinMatch=sp.match(/^CLIN:\s*(\d+)/i);
      if(clinMatch){ tokens.push('CLIN:'+clinMatch[1]); return; }

      // PBL: A+D 1-4 type (combined groups) - extract first letter
      var pblPlus=sp.match(/^PBL:\s*([A-Z])\s*[+&]/i);
      if(pblPlus){ tokens.push('PBL:'+pblPlus[1].toUpperCase()); return; }
      var pblSingle=sp.match(/^PBL:\s*([A-Z])$/i);
      if(pblSingle){ tokens.push('PBL:'+pblSingle[1].toUpperCase()); return; }

      var up=sp.toUpperCase().replace(/\s+/g,'');
      if(up==='ALL'){ tokens.push('ALL'); return; }
      if(up==='CAL-ALL'){ tokens.push('CAL-ALL'); return; }
      if(up==='CC-ALL'){ tokens.push('CC-ALL'); return; }
      if(sp.toLowerCase().includes('international')){ tokens.push('INTL'); return; }
    });
  });

  return tokens.filter(function(v,i,a){ return a.indexOf(v)===i; });
}

// ── ROW MATCHING ──
function rowMatches(row){
  var tokens=row.studentsNorm;

  // ALL always matches
  if(tokens.indexOf('ALL')>=0) return true;

  // Campus filter
  var campusOk=true;
  if(selCampus.size>0){
    var c=row.campus;
    campusOk=(c==='Both'||[...selCampus].some(function(sc){return c.includes(sc);}));
    if(!campusOk) return false;
  }

  // CAL-ALL matches if Callaghan selected (or no campus filter)
  if(tokens.indexOf('CAL-ALL')>=0&&(selCampus.has('Callaghan')||selCampus.size===0)) return true;
  // CC-ALL matches if Central Coast selected (or no campus filter)
  if(tokens.indexOf('CC-ALL')>=0&&(selCampus.has('Central Coast')||selCampus.size===0)) return true;

  // International
  if(selIntl&&tokens.indexOf('INTL')>=0) return true;

  // PBL / CLIN
  for(var sel of selStudents){
    if(tokens.indexOf(sel)>=0) return true;
  }
  return false;
}

function getFiltered(){
  if(selStudents.size===0&&selCampus.size===0&&!selIntl) return [];
  return allRows.filter(function(row){
    if(selWeeks.size>0&&!selWeeks.has(row.week)) return false;
    return rowMatches(row);
  });
}

// ── EDITOR CHIP BUILDER ──
function buildEditorChips(){
  var pblSet=new Set(), clinNums=new Set(), hasIntl=false;

  allRows.forEach(function(r){
    r.studentsNorm.forEach(function(v){
      if(v.startsWith('PBL:')){
        var l=v.replace('PBL:','');
        if(/^[A-T]$/.test(l)) pblSet.add(v);
      } else if(v.startsWith('CLIN:')){
        clinNums.add(parseInt(v.replace('CLIN:',''))||0);
      } else if(v==='INTL') hasIntl=true;
    });
  });

  mkEdChips('ed-campus',['Callaghan','Central Coast'],'campus','s-campus');
  mkEdChips('ed-pbl',[...pblSet].sort(),'student','s-pbl');
  var clinList=[...clinNums].sort(function(a,b){return a-b;}).map(function(n){return 'CLIN:'+n;});
  mkEdChips('ed-clin',clinList,'student','s-clin');
  if(hasIntl){
    mkEdChips('ed-intl',['International Students'],'intl','s-intl');
  }

  restoreChipState();
}

function mkEdChips(elId,list,kind,selCls){
  var el=document.getElementById(elId); el.innerHTML='';
  list.forEach(function(s){
    var t=document.createElement('span');
    t.className='chip';
    // Display label
    t.textContent=(kind==='intl')?'International Students':s;
    t.dataset.val=s; t.dataset.kind=kind;
    t.onclick=function(){
      var cls=t.classList.contains(selCls);
      if(cls){
        t.className='chip';
        if(kind==='campus') selCampus.delete(s);
        else if(kind==='intl'){selIntl=false;}
        else selStudents.delete(s);
      } else {
        t.className='chip '+selCls;
        if(kind==='campus') selCampus.add(s);
        else if(kind==='intl'){selIntl=true;}
        else selStudents.add(s);
      }
    };
    el.appendChild(t);
  });
}

function restoreChipState(){
  if(profile.campus) profile.campus.split(',').forEach(function(c){
    c=c.trim(); if(!c) return;
    var el=document.querySelector('#ed-campus [data-val="'+c+'"]');
    if(el){el.className='chip s-campus';selCampus.add(c);}
  });
  if(profile.pbl) profile.pbl.split(',').forEach(function(p){
    p=p.trim(); if(!p) return;
    var el=document.querySelector('#ed-pbl [data-val="'+p+'"]');
    if(el){el.className='chip s-pbl';selStudents.add(p);}
  });
  if(profile.clin) profile.clin.split(',').forEach(function(c){
    c=c.trim(); if(!c) return;
    var el=document.querySelector('#ed-clin [data-val="'+c+'"]');
    if(el){el.className='chip s-clin';selStudents.add(c);}
  });
  if(profile.intl){
    selIntl=true;
    var el=document.querySelector('#ed-intl [data-val="International Students"]');
    if(el) el.className='chip s-intl';
  }
}

function saveProfile(){
  profile.campus=[...selCampus].join(',');
  profile.pbl=[...selStudents].filter(function(s){return s.startsWith('PBL:');}).join(',');
  profile.clin=[...selStudents].filter(function(s){return s.startsWith('CLIN:');}).join(',');
  profile.intl=selIntl;
  try{localStorage.setItem('medi_profile',JSON.stringify(profile));}catch(e){}
  applyProfile();
  renderWeekFilter();
  renderCal();
  switchTab(0);
}

function applyProfile(){
  var groups=document.getElementById('profileGroups');
  var tags=[];
  selCampus.forEach(function(c){tags.push('<span class="profile-tag pt-campus">'+escHtml(c)+'</span>');});
  selStudents.forEach(function(s){
    if(s.startsWith('PBL:')) tags.push('<span class="profile-tag pt-pbl">'+escHtml(s)+'</span>');
    else if(s.startsWith('CLIN:')) tags.push('<span class="profile-tag pt-clin">'+escHtml(s)+'</span>');
  });
  if(selIntl) tags.push('<span class="profile-tag pt-intl">International</span>');
  if(tags.length===0){
    groups.innerHTML='<span style="font-size:13px;color:var(--hint)">아직 선택된 그룹이 없어요</span>';
    document.getElementById('profileSub').textContent='설정에서 그룹을 선택하세요';
  } else {
    groups.innerHTML=tags.join('');
    document.getElementById('profileSub').textContent='내 수업만 필터링 중';
  }
}

function renderWeekFilter(){
  var weeks=[...new Set(allRows.map(function(r){return r.week;}))].filter(Boolean)
    .sort(function(a,b){return (parseInt(a)||0)-(parseInt(b)||0);});
  var el=document.getElementById('weekFilterRow'); el.innerHTML='';
  var allBtn=document.createElement('span');
  allBtn.className='chip s-week'; allBtn.textContent='전체 주차';
  allBtn.onclick=function(){
    selWeeks.clear();
    el.querySelectorAll('[data-wk]').forEach(function(b){b.className='chip';});
    renderCal();
  };
  el.appendChild(allBtn);
  weeks.forEach(function(w){
    var t=document.createElement('span');
    t.className='chip'; t.textContent='W'+w; t.dataset.wk=w;
    t.onclick=function(){
      if(selWeeks.has(w)){selWeeks.delete(w);t.className='chip';}
      else{selWeeks.add(w);t.className='chip s-week';}
      renderCal();
    };
    el.appendChild(t);
  });
}

function evClass(type){
  var t=(type||'').toLowerCase();
  if(t.includes('lab')) return 'ev-lab';
  if(t.includes('lecture')) return 'ev-lecture';
  if(t.includes('pbl')) return 'ev-pbl';
  return 'ev-other';
}

function renderCal(){
  var rows=getFiltered();
  var statsEl=document.getElementById('statsRow');
  statsEl.innerHTML=
    '<div class="stat"><div class="stat-n">'+rows.length+'</div><div class="stat-l">수업</div></div>'+
    '<div class="stat"><div class="stat-n">'+new Set(rows.map(function(r){return r.date;})).size+'</div><div class="stat-l">일자</div></div>'+
    '<div class="stat"><div class="stat-n">'+rows.filter(function(r){return r.att==='M';}).length+'</div><div class="stat-l">필수</div></div>';

  var wrap=document.getElementById('calWrap');
  if(rows.length===0){
    wrap.innerHTML='<div class="empty">설정에서 내 그룹을 선택하면<br>시간표가 여기 나와요</div>';
    return;
  }

  var weeks=[...new Set(rows.map(function(r){return r.week;}))].sort(function(a,b){return (parseInt(a)||0)-(parseInt(b)||0);});
  var html='';
  modalEvents=[];

  weeks.forEach(function(wk){
    var wkRows=rows.filter(function(r){return r.week===wk;});

    // Build date lookup: day -> date string (from actual data)
    var dateByDay={};
    wkRows.forEach(function(r){if(!dateByDay[r.day]&&r.date) dateByDay[r.day]=r.date;});
    // For days with no class, try to infer date from adjacent days
    // Find any date in this week and derive Mon date
    var anyDate=null;
    DAYS.forEach(function(d){if(dateByDay[d]) anyDate=dateByDay[d];});
    if(anyDate){
      var base=new Date(anyDate+'T00:00:00');
      var dayIdx=base.getDay(); // 0=Sun,1=Mon,...,5=Fri
      var monOffset=1-dayIdx; // offset to Monday
      var monDate=new Date(base); monDate.setDate(base.getDate()+monOffset);
      DAYS.forEach(function(d,i){
        if(!dateByDay[d]){
          var dd=new Date(monDate); dd.setDate(monDate.getDate()+i);
          dateByDay[d]=dd.toISOString().slice(0,10);
        }
      });
    }

    // Time range for this week
    var minH=23, maxH=8;
    wkRows.filter(function(r){return r.hasTime;}).forEach(function(r){
      minH=Math.min(minH,Math.floor(r.startMin/60));
      maxH=Math.max(maxH,Math.ceil(r.endMin/60));
    });
    if(minH>maxH){minH=8;maxH=18;}
    minH=Math.max(7,minH);
    maxH=Math.min(21,maxH+1);
    var totalH=maxH-minH;
    var gridH=totalH*PX_PER_H;

    // Always show Mon-Fri
    var colW=Math.max(70,Math.floor(260/5));
    var totalW=44+5*colW;

    html+='<div class="week-section"><div class="week-title">Week '+wk+'</div>';
    html+='<div class="cal-scroll"><div class="cal-grid" style="min-width:'+totalW+'px">';

    // Header: always Mon-Fri
    html+='<div class="cal-header" style="grid-template-columns:44px repeat(5,'+colW+'px)">';
    html+='<div></div>';
    DAYS.forEach(function(d){
      var date=dateByDay[d]?dateByDay[d].slice(5).replace('-','/'):'';
      var hasClass=wkRows.some(function(r){return r.day===d;});
      html+='<div class="cal-day-head"><div class="day-name'+(hasClass?' has-class':'')+'">'+DAY_KO[d]+'</div><div class="day-date">'+date+'</div></div>';
    });
    html+='</div>';

    // Body
    html+='<div class="cal-body" style="grid-template-columns:44px repeat(5,'+colW+'px)">';
    // Time column
    html+='<div>';
    for(var h=minH;h<maxH;h++) html+='<div class="time-cell">'+h+':00</div>';
    html+='</div>';

    // Day columns - always Mon-Fri
    DAYS.forEach(function(d){
      html+='<div class="day-col" style="height:'+gridH+'px">';
      for(var h=minH;h<maxH;h++) html+='<div class="hour-line" style="top:'+((h-minH)*PX_PER_H)+'px"></div>';

      var dayRows=wkRows.filter(function(r){return r.day===d;});

      // Timed events
      var timedRows=dayRows.filter(function(r){return r.hasTime;});
      timedRows.forEach(function(r){
        var top=(r.startMin-minH*60)/60*PX_PER_H;
        var dur=(r.endMin-r.startMin)/60*PX_PER_H;
        top=Math.max(0,top);
        dur=Math.max(20,dur);
        // clamp to grid
        if(top+dur>gridH) dur=gridH-top;
        var idx=modalEvents.length; modalEvents.push(r);
        html+='<div class="cal-event '+evClass(r.type)+'" style="top:'+top.toFixed(1)+'px;height:'+dur.toFixed(1)+'px" onclick="showModal('+idx+')">'+
          '<div class="ev-title">'+escHtml(r.activity||'—')+'</div>'+
          '<div class="ev-time">'+escHtml(r.time)+'</div>'+
          (r.venue?'<div class="ev-venue">'+escHtml(r.venue)+'</div>':'')+
          '</div>';
      });

      // No-time events stacked at top
      var noTimeRows=dayRows.filter(function(r){return !r.hasTime;});
      var noTop=4;
      noTimeRows.forEach(function(r){
        var idx=modalEvents.length; modalEvents.push(r);
        html+='<div class="cal-event ev-notime" style="top:'+noTop+'px;left:2px;right:2px;height:20px" onclick="showModal('+idx+')">'+
          escHtml(r.activity||'—')+'</div>';
        noTop+=22;
      });

      html+='</div>';
    });
    html+='</div></div></div></div>';
  });

  wrap.innerHTML=html;
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showModal(idx){
  var r=modalEvents[idx]; if(!r) return;
  document.getElementById('modalTitle').textContent=r.activity||'수업 정보';
  var dateDisp=r.date?r.date.slice(5).replace('-','/'):'';
  document.getElementById('modalBody').innerHTML=
    mrow('일시',(DAY_KO[r.day]||r.day)+' '+dateDisp+'  '+r.time)+
    mrow('장소',r.venue||'—')+
    mrow('유형',r.type||'—')+
    mrow('도메인',r.domain||'—')+
    '<div class="modal-row"><span class="modal-key">대상</span><span class="modal-val" style="font-family:\'DM Mono\',monospace;font-size:12px">'+escHtml(r.students)+'</span></div>'+
    '<div class="modal-row"><span class="modal-key">출석</span><span class="modal-val">'+(r.att==='M'?'<span class="badge-m">필수</span>':'<span class="badge-o">선택</span>')+'</span></div>';
  document.getElementById('modalBg').classList.add('open');
}
function mrow(k,v){
  return '<div class="modal-row"><span class="modal-key">'+k+'</span><span class="modal-val">'+escHtml(v)+'</span></div>';
}
function closeModal(e){
  if(e.target===document.getElementById('modalBg')) document.getElementById('modalBg').classList.remove('open');
}
</script>
